name: Release

# リリース手順:
#   1. package.json の version を更新
#   2. git tag v0.0.x && git push origin v0.0.x
#   タグのpushをトリガーに6プラットフォーム分のVSIXをビルド・公開する
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: win32-x64
            npm_arch: win32-x64
          - target: win32-arm64
            npm_arch: win32-arm64
          - target: linux-x64
            npm_arch: linux-x64
          - target: linux-arm64
            npm_arch: linux-arm64
          - target: darwin-x64
            npm_arch: darwin-x64
          - target: darwin-arm64
            npm_arch: darwin-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # 対象プラットフォームのesbuildバイナリをインストール
      # CIはLinux上で実行されるため、他OS向けバイナリは--forceで強制インストール
      - name: Install platform-specific esbuild
        run: npm install --no-save --force @esbuild/${{ matrix.npm_arch }}

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npx vsce package --target ${{ matrix.target }} -o jsx-preview-${{ matrix.target }}.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: jsx-preview-${{ matrix.target }}.vsix

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Publish to Marketplace
        run: npx vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
